# ============================================================
# docker-compose.yml  –  E-Learning Project
# For local testing. In Coolify, each service is deployed
# separately using its own Dockerfile.
# ============================================================

services:
  # ─── Backend (NestJS) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elearning_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      # AWS S3
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      # VNPay
      VNP_TMN_CODE: ${VNP_TMN_CODE}
      VNP_HASH_SECRET: ${VNP_HASH_SECRET}
      VNP_URL: ${VNP_URL}
      VNP_API_URL: ${VNP_API_URL}
      VNP_RETURN_URL: ${VNP_RETURN_URL}
    networks:
      - elearning_net

  # ─── Frontend (Next.js) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars must be provided at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: elearning_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    networks:
      - elearning_net

networks:
  elearning_net:
    driver: bridge
